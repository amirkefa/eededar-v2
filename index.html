<script>
function toggleMenu(){var h=document.getElementById('hamburger'),m=document.getElementById('mobile-menu');h.classList.toggle('open');m.classList.toggle('open');}
function updateClock(){var n=new Date(),t=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0')+':'+n.getSeconds().toString().padStart(2,'0');var e=document.getElementById('lcd-time');if(e)e.textContent=t;}
setInterval(updateClock,1000);updateClock();
var blinkInterval=null;
function startBlink(){stopBlink();var isLit=false;function tick(){var btn=document.querySelector('.earthos-link');if(!btn)return;isLit=!isLit;if(isLit){btn.classList.add('lit');}else{btn.classList.remove('lit');}blinkInterval=setTimeout(tick,1000);}blinkInterval=setTimeout(tick,1000);}

const container=document.getElementById('canvas-container');
const scene=new THREE.Scene();scene.background=new THREE.Color(0xF0F0F2);
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);camera.position.z=7;
const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(window.innerWidth,window.innerHeight);renderer.setPixelRatio(window.devicePixelRatio);container.appendChild(renderer.domElement);
const pCanvas=document.createElement('canvas');pCanvas.width=64;pCanvas.height=64;const pCtx=pCanvas.getContext('2d');const grad=pCtx.createRadialGradient(32,32,0,32,32,32);grad.addColorStop(0,'rgba(60,60,80,1)');grad.addColorStop(0.3,'rgba(60,60,80,0.6)');grad.addColorStop(0.7,'rgba(60,60,80,0.1)');grad.addColorStop(1,'rgba(60,60,80,0)');pCtx.fillStyle=grad;pCtx.beginPath();pCtx.arc(32,32,32,0,Math.PI*2);pCtx.fill();const particleTexture=new THREE.CanvasTexture(pCanvas);
const waveWidth=80,waveDepth=80,waveGeo=new THREE.BufferGeometry(),wavePos=new Float32Array(waveWidth*waveDepth*3);for(let i=0;i<waveWidth;i++)for(let j=0;j<waveDepth;j++){const idx=(i*waveDepth+j)*3;wavePos[idx]=(i-waveWidth/2)*0.4;wavePos[idx+1]=0;wavePos[idx+2]=(j-waveDepth/2)*0.4-2;}waveGeo.setAttribute('position',new THREE.BufferAttribute(wavePos,3));scene.add(new THREE.Points(waveGeo,new THREE.PointsMaterial({color:0x4A4A5A,size:0.18,transparent:true,opacity:0.6,map:particleTexture,alphaTest:0.01,depthWrite:false})));
const loader=new THREE.TextureLoader();
const NUM=28;
const textures=Array.from({length:NUM},function(_,i){return loader.load('images/'+(i+1)+'.jpg');});
const group=new THREE.Group();scene.add(group);
const sphereRadius=2.2,cubeSize=0.7,gap=0.02,step=cubeSize+gap,gridSize=7,half=(gridSize-1)/2;
const cubes=[],homePositions=[],targetPositions=[];
function getTexIdx(x,y,z,face){var hash=(x*7+y*13+z*17+face*5+x*y*3+y*z*11+x*z*7)%NUM;return (hash+NUM)%NUM;}
for(let x=0;x<gridSize;x++)for(let y=0;y<gridSize;y++)for(let z=0;z<gridSize;z++){
  const px=(x-half)*step,py=(y-half)*step,pz=(z-half)*step;
  if(Math.sqrt(px*px+py*py+pz*pz)>sphereRadius)continue;
  const geo=new THREE.BoxGeometry(cubeSize,cubeSize,cubeSize);
  const mat=[
    new THREE.MeshBasicMaterial({map:textures[getTexIdx(x,y,z,0)]}),
    new THREE.MeshBasicMaterial({map:textures[getTexIdx(x,y,z,1)]}),
    new THREE.MeshBasicMaterial({map:textures[getTexIdx(x,y,z,2)]}),
    new THREE.MeshBasicMaterial({map:textures[getTexIdx(x,y,z,3)]}),
    new THREE.MeshBasicMaterial({map:textures[getTexIdx(x,y,z,4)]}),
    new THREE.MeshBasicMaterial({map:textures[getTexIdx(x,y,z,5)]})
  ];
  const cube=new THREE.Mesh(geo,mat);
  cube.position.set(px,py,pz);
  group.add(cube);cubes.push(cube);
  homePositions.push(new THREE.Vector3(px,py,pz));
  targetPositions.push(new THREE.Vector3(px,py,pz));
  const edges=new THREE.LineSegments(new THREE.EdgesGeometry(geo),new THREE.LineBasicMaterial({color:0xAAAAAA,transparent:true,opacity:0.3}));
  edges.position.set(px,py,pz);group.add(edges);
}
scene.add(new THREE.AmbientLight(0xffffff,1.5));const d1=new THREE.DirectionalLight(0xffffff,2.5);d1.position.set(5,5,5);scene.add(d1);const d2=new THREE.DirectionalLight(0xffffff,1);d2.position.set(-5,-3,-5);scene.add(d2);const d3=new THREE.DirectionalLight(0xffffff,0.8);d3.position.set(0,10,0);scene.add(d3);
let currentSection='home',mouseX=0,mouseY=0,time=0;
document.addEventListener('mousemove',function(e){mouseX=(e.clientX/window.innerWidth-0.5)*0.6;mouseY=(e.clientY/window.innerHeight-0.5)*0.6;});
function showContent(section){const content=document.getElementById('content');const lcd=document.getElementById('lcd-screen');document.getElementById('content-inner').innerHTML=contents[section]||'';content.classList.add('visible');lcd.classList.remove('poweron','poweroff');void lcd.offsetWidth;lcd.classList.add('poweron');setTimeout(function(){content.classList.add('shown');if(section==='productions')startBlink();},50);}
function hideContent(){stopBlink();const content=document.getElementById('content');const lcd=document.getElementById('lcd-screen');content.classList.remove('shown');lcd.classList.remove('poweron');lcd.classList.add('poweroff');setTimeout(function(){content.classList.remove('visible');lcd.classList.remove('poweroff');},300);}
function goSection(section){currentSection=section;document.querySelectorAll('.nav-btn,.mobile-menu-btn').forEach(function(b){b.classList.remove('active');});var btn=document.getElementById('btn-'+section);if(btn)btn.classList.add('active');var mbtn=document.getElementById('mbtn-'+section);if(mbtn)mbtn.classList.add('active');document.getElementById('tagline').style.display=section==='home'?'block':'none';document.getElementById('title').style.display=section==='home'?'block':'none';hideContent();setTimeout(function(){if(section==='home'){cubes.forEach(function(c,i){c.scale.set(1,1,1);targetPositions[i].copy(homePositions[i]);});return;}cubes.forEach(function(_,i){const dir=homePositions[i].clone().normalize();if(section==='studio'){targetPositions[i].set(dir.x*(4+Math.random()*3),dir.y*(4+Math.random()*3),dir.z*(4+Math.random()*3));setTimeout(function(){showContent('studio');},600);}if(section==='productions'){const angle=(i/cubes.length)*Math.PI*2;targetPositions[i].set(Math.cos(angle)*(4+Math.random()),(Math.random()-0.5)*2,Math.sin(angle)*(4+Math.random()));setTimeout(function(){showContent('productions');},600);}if(section==='about'){targetPositions[i].set(dir.x*(5+Math.random()*4),dir.y*(5+Math.random()*4),-4-Math.random()*4);setTimeout(function(){showContent('about');},800);}if(section==='contact'){targetPositions[i].set(dir.x*(5+Math.random()*3),dir.y*(5+Math.random()*3),(Math.random()-0.5)*6);setTimeout(function(){showContent('contact');},600);}});},350);}
function animate(){requestAnimationFrame(animate);time+=0.015;cubes.forEach(function(cube,i){cube.position.lerp(targetPositions[i],0.08);});const positions=waveGeo.getAttribute('position');for(let i=0;i<waveWidth;i++)for(let j=0;j<waveDepth;j++){const idx=i*waveDepth+j;positions.setY(idx,Math.sin(positions.getX(idx)*0.8+time)*0.3+Math.cos(positions.getZ(idx)*0.6+time*0.8)*0.2);}positions.needsUpdate=true;if(currentSection==='home'){group.rotation.x+=0.002;group.rotation.y+=0.004;}else{group.rotation.x*=0.95;group.rotation.y*=0.95;}camera.position.x+=(mouseX-camera.position.x)*0.04;camera.position.y+=(-mouseY-camera.position.y)*0.04;camera.lookAt(scene.position);renderer.render(scene,camera);}
animate();
window.addEventListener('resize',function(){camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
</script>
